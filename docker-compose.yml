services:
  postgres:
    image: postgres:16-alpine
    container_name: taskplatform-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taskplatform
      POSTGRES_USER: taskplatform
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - taskplatform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskplatform -d taskplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskplatform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - taskplatform-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  task-platform:
    build:
      context: .
      dockerfile: apps/task-platform/Dockerfile.dev
    container_name: taskplatform-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - taskplatform-network

  reminder-worker:
    build:
      context: .
      dockerfile: apps/reminder-worker/Dockerfile.dev
    container_name: taskplatform-reminder-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      task-platform:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - taskplatform-network

volumes:
  postgres-data:
  redis-data:

networks:
  taskplatform-network:
    name: taskplatform-network
    driver: bridge
